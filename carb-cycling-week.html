<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Carb Cycling Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
 --bg:#0c0e11; --panel:#15181e; --panel2:#1b1f26; --line:#272d36; --ink:#eaecef; --mut:#8a92a0;
 --low:#6f7dff; --lowdim:#171d33; --high:#ff8a3d; --highdim:#2a1b11; --gym:#39dca0; --gymdim:#10271f;
 --display:'Archivo',system-ui,sans-serif; --body:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased}
body{max-width:540px;margin:0 auto;padding:0 13px 60px;overflow-x:hidden}
.head{padding:16px 2px 6px;position:sticky;top:0;background:linear-gradient(180deg,var(--bg) 72%,transparent);z-index:30}
.brand{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.brand h1{font-family:var(--display);font-weight:900;font-size:21px;letter-spacing:-.02em;margin:0;line-height:1}
.brand .pp{font-family:var(--mono);font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.12em}
.controls{margin-top:11px;display:flex;flex-direction:column;gap:9px}
.ctlrow{display:flex;gap:9px}
.seg{flex:1;display:flex;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:3px;gap:3px}
.seg button{flex:1;border:0;background:transparent;color:var(--mut);font-family:var(--display);font-weight:700;font-size:11.5px;padding:7px 4px;border-radius:8px;cursor:pointer;letter-spacing:.01em;transition:.15s}
.seg button.on{color:#0c0e11}
.seg.phase button.on{background:var(--ink)}
.seg.struct button.on.cyc{background:var(--high);color:#0c0e11}
.seg.struct button.on.uni{background:var(--low);color:#0c0e11}
.sliders{display:flex;gap:9px}
.slider{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:8px 11px}
.slider .lab{display:flex;justify-content:space-between;align-items:baseline;font-size:10px;color:var(--mut);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.slider .lab b{color:var(--ink);font-size:13px;font-family:var(--display);letter-spacing:0}
.slider .lab b span{font-size:9px;color:var(--mut);font-weight:400}
input[type=range]{-webkit-appearance:none;width:100%;height:22px;background:transparent;cursor:pointer;margin:0}
input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:3px;background:var(--line)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;background:var(--ink);margin-top:-7px;border:3px solid var(--bg);box-shadow:0 0 0 1px var(--line)}
input[type=range]::-moz-range-track{height:4px;border-radius:3px;background:var(--line)}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--ink);border:3px solid var(--bg)}
.tabs{display:flex;gap:5px;overflow-x:auto;padding:9px 2px 6px;scrollbar-width:none;-ms-overflow-style:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;min-width:40px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:8px 6px 7px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;position:relative;transition:.12s}
.tab .d{font-family:var(--display);font-weight:800;font-size:11px;color:var(--mut);letter-spacing:.02em}
.tab .wave{width:20px;height:13px;display:flex;align-items:flex-end;justify-content:center}
.tab .wave i{width:5px;border-radius:2px;background:var(--mut);transition:.18s}
.tab .dot{width:5px;height:5px;border-radius:50%;background:transparent;transition:.12s}
.tab.high{border-color:#5a3a22} .tab.high .d{color:var(--high)} .tab.high .wave i{background:var(--high)}
.tab.low{border-color:#2f3550} .tab.low .d{color:var(--low)} .tab.low .wave i{background:var(--low)}
.tab.med{border-color:#2c4a3e} .tab.med .d{color:var(--gym)} .tab.med .wave i{background:var(--gym)}
.tab.wo .dot{background:var(--gym)}
.tab.on{background:var(--panel2);box-shadow:0 0 0 1.5px var(--ink)}
.tab.util{justify-content:center;min-width:54px;font-family:var(--display);font-weight:700;font-size:12px;color:var(--mut);padding:0 12px}
.tab.util.on{color:var(--ink)}
.reveal{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.dayhd{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:4px 2px 11px}
.dayhd .dn{font-family:var(--display);font-weight:900;font-size:19px;letter-spacing:-.01em}
.dtog{display:flex;gap:6px}
.dtog .seg{padding:2px}
.dtog .seg button{font-size:10.5px;padding:5px 9px}
.dtog .seg button.on.low{background:var(--low);color:#0c0e11}
.dtog .seg button.on.high{background:var(--high);color:#0c0e11}
.dtog .seg button.on.rest{background:#3a424e;color:var(--ink)}
.dtog .seg button.on.gym{background:var(--gym);color:#0c0e11}
.hero{position:relative;border-radius:17px;padding:15px 16px 14px;margin-bottom:12px;border:1px solid var(--line);overflow:hidden;background:var(--panel)}
.hero.high{background:linear-gradient(135deg,#221610,#16110d);border-color:#5a3a22}
.hero.low{background:linear-gradient(135deg,#141728,#101218);border-color:#2f3550}
.hero.med{background:linear-gradient(135deg,#10211b,#0f1512);border-color:#2c4a3e}
.htags{display:flex;gap:6px;margin-bottom:11px;flex-wrap:wrap}
.htag{font-family:var(--mono);font-weight:700;font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;padding:4px 8px;border-radius:6px;background:#0c0e1199;color:var(--mut)}
.htag.high{color:var(--high)} .htag.low{color:var(--low)} .htag.gym{color:var(--gym)} .htag.med{color:var(--gym)}
.kc{display:flex;align-items:baseline;gap:7px;margin-bottom:11px}
.kc .big{font-family:var(--display);font-weight:900;font-size:38px;letter-spacing:-.02em;line-height:.9}
.kc .un{font-family:var(--mono);font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.1em}
.kc .perkg{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--mut);text-align:right;line-height:1.5}
.kc .perkg b{color:var(--ink);font-size:12px}
.splt{height:7px;border-radius:4px;overflow:hidden;display:flex;background:#0c0e1166;margin-bottom:8px}
.splt i{height:100%}.splt .sp{background:var(--gym)}.splt .sc{background:var(--high)}.splt .sf{background:#e8c34a}
.leg{display:flex;gap:7px}
.leg .it{flex:1;background:#0c0e1155;border-radius:9px;padding:7px 9px}
.leg .it .k{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--mut);margin-bottom:1px}
.leg .it .k em{width:8px;height:8px;border-radius:2px;font-style:normal}
.leg .p .k em{background:var(--gym)} .leg .c .k em{background:var(--high)} .leg .f .k em{background:#e8c34a}
.leg .it .g{font-family:var(--display);font-weight:800;font-size:17px}.leg .it .g small{font-size:10px;color:var(--mut);font-weight:500}
.mctl{display:flex;align-items:center;justify-content:space-between;margin:0 2px 9px}
.mctl .h{font-family:var(--mono);font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.1em}
.mctl button{background:var(--panel);border:1px solid var(--line);color:var(--mut);font-family:var(--display);font-weight:700;font-size:10.5px;padding:6px 11px;border-radius:9px;cursor:pointer}
.meal{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:9px;overflow:hidden}
.meal.wo{border-color:#2c4a3e}
.mealhd{display:flex;align-items:center;gap:9px;padding:12px 14px;cursor:pointer}
.mealhd .nm{font-family:var(--display);font-weight:800;font-size:14.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mealhd .tm{font-family:var(--mono);font-size:9.5px;color:var(--mut);font-weight:500}
.mealhd .wob{font-family:var(--mono);font-size:8.5px;font-weight:700;color:var(--gym);background:var(--gymdim);padding:2px 5px;border-radius:4px;letter-spacing:.05em}
.mealhd .mk{margin-left:auto;font-family:var(--display);font-weight:800;font-size:14px;color:var(--ink)}
.mealhd .mk small{font-size:9px;color:var(--mut);font-weight:500}
.mealhd .chev{width:9px;height:9px;border-right:2px solid var(--mut);border-bottom:2px solid var(--mut);transform:rotate(45deg);transition:.2s;margin-left:3px;flex:0 0 auto}
.meal.open .mealhd .chev{transform:rotate(-135deg)}
.mealbd{max-height:0;overflow:hidden;transition:max-height .3s ease}
.meal.open .mealbd{max-height:900px}
.slot{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--line)}
.slot .left{flex:1;min-width:0}
.slot .roletag{font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:.09em;color:var(--mut);margin-bottom:4px;display:block}
.slot.protein .roletag{color:var(--gym)} .slot.carb .roletag{color:var(--high)} .slot.fat .roletag{color:#e8c34a}
.swapwrap{position:relative;display:inline-flex;align-items:center;max-width:100%}
select.swap{appearance:none;-webkit-appearance:none;background:var(--panel2);border:1px solid var(--line);color:var(--ink);font-family:var(--body);font-weight:600;font-size:13.5px;padding:6px 26px 6px 10px;border-radius:9px;cursor:pointer;max-width:100%;text-overflow:ellipsis}
.swapwrap::after{content:'';position:absolute;right:10px;width:6px;height:6px;border-right:2px solid var(--mut);border-bottom:2px solid var(--mut);transform:rotate(45deg);pointer-events:none;margin-top:-2px}
.vegname{font-family:var(--body);font-weight:600;font-size:13.5px;padding:6px 0;display:inline-block}
.amt{font-family:var(--mono);font-size:11px;color:var(--mut);margin-top:5px}
.amt .alt{opacity:.72}
.slot .mac{text-align:right;font-family:var(--mono);font-size:10.5px;color:var(--mut);line-height:1.5;flex:0 0 auto}
.slot .mac b{font-family:var(--display);font-weight:800;font-size:13px;color:var(--ink)}
.sheet{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:13px}
.note{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:9px 11px;font-size:11.5px;color:var(--mut);line-height:1.55;margin-bottom:11px}
.note b{color:var(--ink)}
.shoprow{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.shoprow:last-child{border-bottom:0}
.shoprow input{appearance:none;-webkit-appearance:none;width:19px;height:19px;border:2px solid var(--line);border-radius:6px;flex:0 0 auto;cursor:pointer;position:relative;background:var(--panel2)}
.shoprow input:checked{background:var(--gym);border-color:var(--gym)}
.shoprow input:checked::after{content:'';position:absolute;left:5px;top:1px;width:5px;height:10px;border:solid #0c0e11;border-width:0 2.5px 2.5px 0;transform:rotate(45deg)}
.shoprow .sn{flex:1;font-size:13.5px;font-weight:500}
.shoprow .sc{font-family:var(--mono);font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-left:6px}
.shoprow .sq{font-family:var(--mono);font-size:12px;color:var(--ink);font-weight:500}
.shoprow.done .sn{color:var(--mut);text-decoration:line-through}
.cat{font-family:var(--mono);font-size:9.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.1em;margin:13px 2px 1px;font-weight:700}
.cat:first-child{margin-top:2px}
.gcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin-bottom:9px}
.gcard h3{font-family:var(--display);font-weight:800;font-size:13.5px;margin:0 0 6px;display:flex;align-items:center;gap:9px}
.gcard h3 em{font-style:normal;font-size:10px;font-family:var(--mono);font-weight:700;padding:2px 7px;border-radius:6px}
.gcard.warn h3 em{background:var(--highdim);color:var(--high)} .gcard.info h3 em{background:var(--lowdim);color:var(--low)} .gcard.go h3 em{background:var(--gymdim);color:var(--gym)}
.gcard p{margin:0;font-size:12.5px;color:var(--mut);line-height:1.6}.gcard p+p{margin-top:7px}.gcard b{color:var(--ink);font-weight:600}
.foot{text-align:center;font-family:var(--mono);font-size:9.5px;color:var(--mut);padding:16px 0 4px;letter-spacing:.04em;opacity:.7}
</style>
</head>
<body>
<div class="head">
  <div class="brand"><h1>Carb Cycling</h1><span class="pp" id="phaseLbl">Cut · Cycling</span></div>
  <div class="controls">
    <div class="ctlrow">
      <div class="seg phase" id="phaseSeg">
        <button data-phase="cut">Cut</button>
        <button data-phase="maintain">Maintain</button>
        <button data-phase="bulk">Lean bulk</button>
      </div>
    </div>
    <div class="ctlrow">
      <div class="seg struct" id="structSeg">
        <button data-struct="cycle" class="cyc">Carb cycling</button>
        <button data-struct="uniform" class="uni">Uniform</button>
      </div>
    </div>
    <div class="sliders">
      <div class="slider">
        <div class="lab"><span>Bodyweight</span><b id="wtVal">200<span> lb</span></b></div>
        <input type="range" id="wt" min="120" max="320" step="2" value="200">
      </div>
      <div class="slider">
        <div class="lab"><span>Calories</span><b id="calVal">0<span> %</span></b></div>
        <input type="range" id="cal" min="-3" max="3" step="1" value="0">
      </div>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</div>
<div id="main"></div>
<div class="foot">weigh raw or cooked — protein lands the same · saved to this device</div>
<script>
/* ============ FOOD LIBRARY ============ */
const LIB={
 protein:[
  {id:'mince5',name:'Lean 5% mince',per:100,kcal:137,p:21,c:0.5,f:5,cost:2,cooked:{kcal:166,p:31,c:0.5,f:5}},
  {id:'chicken',name:'Chicken breast',per:100,kcal:106,p:24,c:0,f:1.8,cost:1,cooked:{kcal:165,p:31,c:0,f:3.6}},
  {id:'turkey',name:'Turkey mince',per:100,kcal:148,p:20,c:0,f:7,cost:2,cooked:{kcal:189,p:27,c:0,f:9}},
  {id:'beefxp',name:'Beef-XP shake',per:100,kcal:380,p:90.7,c:2.3,f:1.7,cost:1,scoop:30},
  {id:'eggs',name:'Eggs',per:'unit',unitName:'egg',kcal:72,p:6.3,c:0.4,f:4.8,cost:1},
  {id:'bacon',name:'Bacon medallions',per:'unit',unitName:'rasher',kcal:32,p:5,c:0.2,f:1.2,cost:2},
  {id:'yogurt',name:'Greek 0% yogurt',per:100,kcal:56,p:10,c:4,f:0,cost:1},
  {id:'babybel',name:'Babybel Light',per:'unit',unitName:'pc',kcal:42,p:6.8,c:0.5,f:1.4,cost:2},
 ],
 carb:[
  {id:'rice',name:'White rice',per:100,kcal:355,p:7.5,c:78,f:1,cost:1,cooked:{kcal:130,p:2.7,c:28,f:0.3},dry:1},
  {id:'potato',name:'Potato',per:100,kcal:77,p:2,c:17,f:0.1,cost:1},
  {id:'oats',name:'Oats',per:100,kcal:370,p:13,c:60,f:7,cost:1},
  {id:'toast',name:'Wholemeal bread',per:'unit',unitName:'slice',kcal:90,p:4,c:15,f:1,cost:1},
  {id:'wrap',name:'High-protein wrap',per:'unit',unitName:'wrap',kcal:179,p:9.8,c:30,f:2.3,cost:1},
  {id:'bagel',name:'Bagel',per:'unit',unitName:'bagel',kcal:232,p:8,c:46,f:2,cost:1},
  {id:'ricecake',name:'Rice cakes',per:'unit',unitName:'cake',kcal:28,p:0.6,c:6,f:0.2,cost:1},
  {id:'banana',name:'Banana',per:'unit',unitName:'banana',kcal:95,p:1.2,c:23,f:0.3,cost:1},
  {id:'mateys',name:'Mateys cereal',per:100,kcal:390,p:7,c:83,f:3.5,cost:1},
  {id:'surreal',name:'Surreal cereal',per:100,kcal:382,p:39,c:32,f:11,cost:3},
  {id:'malto',name:'Maltodextrin',per:100,kcal:380,p:0,c:95,f:0,cost:1},
 ],
 fat:[
  {id:'redleic',name:'Red Leicester',per:100,kcal:407,p:25,c:0.3,f:32.3,cost:2},
  {id:'feta',name:'Feta',per:100,kcal:260,p:14,c:1.5,f:22,cost:2},
  {id:'almond',name:'Almonds',per:100,kcal:620,p:21,c:8.3,f:53.3,cost:3},
  {id:'cashew',name:'Cashews',per:100,kcal:600,p:18,c:30,f:47.7,cost:3},
  {id:'baconmayo',name:'Bacon mayo',per:100,kcal:461,p:1.5,c:5,f:48,cost:1},
  {id:'oliveoil',name:'Olive oil',per:'unit',unitName:'tbsp',kcal:120,p:0,c:0,f:14,cost:1},
 ],
 cereal:[
  {id:'surreal',name:'Surreal cereal',per:100,kcal:382,p:39,c:32,f:11,cost:3},
  {id:'mateys',name:'Mateys cereal',per:100,kcal:390,p:7,c:83,f:3.5,cost:1},
  {id:'oats',name:'Oats',per:100,kcal:370,p:13,c:60,f:7,cost:1},
 ],
 milk:[
  {id:'milk',name:'Lactose-free milk',per:100,unitName:'ml',kcal:47,p:3.4,c:4.8,f:1.7,cost:1},
  {id:'nomilk',name:'No milk',per:100,kcal:0,p:0,c:0,f:0,cost:0},
 ],
 berry:[
  {id:'berries',name:'Frozen berries',per:100,kcal:50,p:1,c:10,f:0.3,cost:1},
  {id:'noberry',name:'Skip berries',per:100,kcal:0,p:0,c:0,f:0,cost:0},
 ],
};
const FOOD={}; for(const cat in LIB) LIB[cat].forEach(f=>{ if(!FOOD[f.id]) FOOD[f.id]=f; });

/* ============ MEAL SKELETON (mince-core) ============ */
const MEALS=[
 {n:'Breakfast',time:'7–8am',slots:[
   {role:'srv',group:'cereal',food:'surreal',srv:45},
   {role:'srv',group:'milk',food:'milk',srv:200},
 ]},
 {n:'Lunch',time:'12–1pm',slots:[
   {role:'protein',food:'mince5',tgt:45},
   {role:'carb',food:'rice',tgt:48},
   {role:'fat',food:'redleic',tgt:16},
   {role:'veg'},
 ]},
 {n:'Shake / Snack',time:'3–4pm',woName:'Post-workout',woTime:'after lifting',slots:[
   {role:'protein',food:'beefxp',tgt:30},
   {role:'carb',food:'malto',tgt:20},
 ]},
 {n:'Dinner',time:'6–7pm',slots:[
   {role:'protein',food:'mince5',tgt:45},
   {role:'carb',food:'rice',tgt:55},
   {role:'fat',food:'redleic',tgt:18},
   {role:'veg'},
 ]},
 {n:'Evening',time:'8–9pm',slots:[
   {role:'protein',food:'yogurt',tgt:15},
   {role:'srv',group:'berry',food:'berries',srv:80},
 ]},
];
MEALS.forEach((m,mi)=>m.slots.forEach((s,si)=>s.id='m'+mi+'s'+si));

/* ============ ENGINE ============ */
const PHASE={cut:0.9,maintain:1.0,bulk:1.15};
const DCARB={high:1.95,med:1.0,low:0.28};
const DFAT ={high:0.78,med:1.0,low:1.02};
const PHASE_LBL={cut:'Cut',maintain:'Maintain',bulk:'Lean bulk'};

const DAYS=[['Monday','MON'],['Tuesday','TUE'],['Wednesday','WED'],['Thursday','THU'],['Friday','FRI'],['Saturday','SAT'],['Sunday','SUN']];

/* ---- state ---- */
const KEY='carbCyclingPlanner.v2';
let st={
 phase:'cut', structure:'cycle', weight:200, calAdj:0,
 dayTypes:['high','low','low','high','low','low','low'],
 daySessions:['workout','workout','rest','workout','workout','rest','rest'],
 picks:{}
};
(function load(){ try{ const r=localStorage.getItem(KEY); if(!r)return; const o=JSON.parse(r);
 if(o.phase) st.phase=o.phase; if(o.structure) st.structure=o.structure;
 if(typeof o.weight==='number') st.weight=o.weight; if(typeof o.calAdj==='number') st.calAdj=o.calAdj;
 if(Array.isArray(o.dayTypes)&&o.dayTypes.length===7) st.dayTypes=o.dayTypes.slice();
 if(Array.isArray(o.daySessions)&&o.daySessions.length===7) st.daySessions=o.daySessions.slice();
 if(o.picks&&typeof o.picks==='object') st.picks=o.picks;
 }catch(e){} })();
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(st)); }catch(e){} }

let active=(()=>{const g=new Date().getDay();return g===0?6:g-1;})();
let view='day';
const open=new Set(), checked=new Set();

/* ---- helpers ---- */
const prim=r=>r==='protein'?'p':r==='carb'?'c':'f';
const r5=x=>Math.round(x/5)*5;
const rHalf=x=>{const h=Math.round(x*2)/2;return h%1===0?h:h.toFixed(1);};
const fmt=n=>Math.round(n).toLocaleString('en-GB');
function slotFood(s){ return FOOD[ st.picks[s.id] || s.food ]; }
function levelOf(dt){ return st.structure==='uniform'?'med':dt; }

function effTarget(s,level){
 const bw=st.weight/200, ph=PHASE[st.phase], sl=1+st.calAdj/10, m=prim(s.role);
 let e=s.tgt*bw;
 if(s.role==='carb') e*=DCARB[level]*ph*sl;
 if(s.role==='fat')  e*=DFAT[level]*ph*sl;
 return e;
}
// returns {primary amount (food units/g), display string, macros}
function slotCalc(s,level){
 const f=slotFood(s);
 if(s.role==='veg') return {macros:{kcal:0,p:0,c:0,f:0}, disp:'free — fill the plate', amt:0};
 if(s.role==='srv'){
   const bw=st.weight/200; const amt=f.per==='unit'?rHalf(s.srv*bw):r5(s.srv*bw);
   const sc=f.per==='unit'?amt:amt/100;
   const mac={kcal:f.kcal*sc,p:f.p*sc,c:f.c*sc,f:f.f*sc};
   let disp;
   if(f.kcal===0) disp='—';
   else if(f.per==='unit') disp='\u00d7 '+amt;
   else disp=amt+(f.unitName==='ml'?' ml':' g');
   return {macros:mac,disp,amt};
 }
 const m=prim(s.role), e=effTarget(s,level);
 const perP = f.per==='unit'? f[m] : f[m]/100;
 let amt = perP>0 ? e/perP : 0;
 let dispAmt = f.per==='unit'? rHalf(amt) : r5(amt);
 const sc=f.per==='unit'?dispAmt:dispAmt/100;
 const mac={kcal:f.kcal*sc,p:f.p*sc,c:f.c*sc,f:f.f*sc};
 let disp;
 if(f.per==='unit'){ disp='\u00d7 '+dispAmt; }
 else if(f.cooked){
   const ckP=f.cooked[m]/100; const ckG=r5(perP>0? e/ckP : 0);
   const w1=f.dry?'dry':'raw', w2='cooked';
   disp=dispAmt+'g '+w1+' <span class="alt">· '+ckG+'g '+w2+'</span>';
 } else { disp=dispAmt+'g'; }
 return {macros:mac,disp,amt:dispAmt};
}
function dayTotals(dt){
 const level=levelOf(dt); let T={kcal:0,p:0,c:0,f:0};
 MEALS.forEach(me=>me.slots.forEach(s=>{ const r=slotCalc(s,level); for(const k in T)T[k]+=r.macros[k]; }));
 return T;
}
function counts(){ const hi=st.dayTypes.filter(t=>t==='high').length; const wo=st.daySessions.filter(s=>s==='workout').length; return {hi,lo:7-hi,wo}; }
function weekAvg(){ let T={kcal:0,p:0,c:0,f:0}; DAYS.forEach((_,i)=>{const t=dayTotals(st.dayTypes[i]);for(const k in T)T[k]+=t[k];}); for(const k in T)T[k]/=7; return T; }

/* ---- render: tabs ---- */
function maxC(){ let m=1; DAYS.forEach((_,i)=>{const c=dayTotals(st.dayTypes[i]).c;if(c>m)m=c;}); return m; }
function renderTabs(){
 const el=document.getElementById('tabs'); el.innerHTML=''; const mc=maxC();
 DAYS.forEach(([day,ab],i)=>{
   const lvl=levelOf(st.dayTypes[i]); const wo=st.daySessions[i]==='workout';
   const cls=st.structure==='uniform'?'med':st.dayTypes[i];
   const h=6+Math.round((dayTotals(st.dayTypes[i]).c/mc)*11);
   const b=document.createElement('button');
   b.className='tab '+cls+(wo?' wo':'')+(view==='day'&&i===active?' on':'');
   b.innerHTML='<span class="d">'+ab+'</span><span class="wave"><i style="height:'+h+'px"></i></span><span class="dot"></span>';
   b.onclick=()=>{view='day';active=i;render();};
   el.appendChild(b);
 });
 [['shop','Shop'],['guide','Guide']].forEach(([v,l])=>{
   const b=document.createElement('button'); b.className='tab util'+(view===v?' on':''); b.textContent=l;
   b.onclick=()=>{view=v;render();}; el.appendChild(b);
 });
}

/* ---- render: day ---- */
function optsFor(s){
 let cat = s.role==='srv'? s.group : s.role;
 const cur = st.picks[s.id]||s.food;
 return LIB[cat].map(f=>'<option value="'+f.id+'"'+(f.id===cur?' selected':'')+'>'+f.name+'</option>').join('');
}
function renderDay(){
 const [day]=DAYS[active]; const dt=st.dayTypes[active]; const lvl=levelOf(dt);
 const wo=st.daySessions[active]==='workout'; const T=dayTotals(dt);
 const kg=st.weight/2.2046; const pc=T.p*4,cc=T.c*4,fc=T.f*9,tot=pc+cc+fc||1;
 const uniform=st.structure==='uniform';
 const lvlName = uniform?'Uniform':(dt==='high'?'High carb':'Low carb');
 const heroCls = uniform?'med':dt;

 const carbSeg = uniform ? '' :
   '<div class="seg" role="group"><button class="'+(dt==='low'?'on low':'')+'" data-carb="low">Low</button><button class="'+(dt==='high'?'on high':'')+'" data-carb="high">High</button></div>';
 const sessSeg =
   '<div class="seg" role="group"><button class="'+(!wo?'on rest':'')+'" data-sess="rest">Rest</button><button class="'+(wo?'on gym':'')+'" data-sess="workout">Workout</button></div>';

 const mealsHtml = MEALS.map(me=>{
   const isWO = wo && me.woName;
   const key=active+'-'+me.n; const isOpen=open.has(key);
   let mt={kcal:0,p:0,c:0,f:0};
   const slotsHtml = me.slots.map(s=>{
     const r=slotCalc(s,lvl); for(const k in mt)mt[k]+=r.macros[k];
     if(s.role==='veg'){
       return '<div class="slot veg"><div class="left"><span class="vegname">Vegetables</span><div class="amt">'+r.disp+'</div></div></div>';
     }
     const roletag = s.role==='srv'? (s.group==='cereal'?'cereal':s.group==='milk'?'milk':'extra') : s.role;
     const mac = '<div class="mac"><b>'+fmt(r.macros.kcal)+'</b> kcal<br>P'+Math.round(r.macros.p)+' C'+Math.round(r.macros.c)+' F'+Math.round(r.macros.f)+'</div>';
     return '<div class="slot '+s.role+'"><div class="left"><span class="roletag">'+roletag+'</span>'
       +'<span class="swapwrap"><select class="swap" data-slot="'+s.id+'">'+optsFor(s)+'</select></span>'
       +'<div class="amt">'+r.disp+'</div></div>'+mac+'</div>';
   }).join('');
   const nm = isWO?me.woName:me.n; const tm = isWO?me.woTime:me.time;
   return '<div class="meal'+(isOpen?' open':'')+(isWO?' wo':'')+'">'
     +'<div class="mealhd" data-key="'+key+'"><span class="nm">'+nm+'<span class="tm">'+tm+'</span>'+(isWO?'<span class="wob">WO</span>':'')+'</span>'
     +'<span class="mk">'+fmt(mt.kcal)+'<small> kcal</small></span><span class="chev"></span></div>'
     +'<div class="mealbd">'+slotsHtml+'</div></div>';
 }).join('');
 const allOpen=MEALS.every(me=>open.has(active+'-'+me.n));

 document.getElementById('main').innerHTML='<div class="reveal">'
   +'<div class="dayhd"><div class="dn">'+day+'</div><div class="dtog">'+carbSeg+sessSeg+'</div></div>'
   +'<div class="hero '+heroCls+'">'
     +'<div class="htags"><span class="htag '+heroCls+'">'+lvlName+'</span><span class="htag '+(wo?'gym':'')+'">'+(wo?'Workout day':'Rest day')+'</span><span class="htag">'+PHASE_LBL[st.phase]+'</span></div>'
     +'<div class="kc"><span class="big">'+fmt(T.kcal)+'</span><span class="un">kcal</span><span class="perkg">'+(T.p/kg).toFixed(1)+' g/kg protein<br><b>'+Math.round(T.p)+'g</b> protein</span></div>'
     +'<div class="splt"><i class="sp" style="width:'+(pc/tot*100)+'%"></i><i class="sc" style="width:'+(cc/tot*100)+'%"></i><i class="sf" style="width:'+(fc/tot*100)+'%"></i></div>'
     +'<div class="leg"><div class="it p"><div class="k"><em></em>Protein</div><div class="g">'+Math.round(T.p)+'<small>g</small></div></div>'
       +'<div class="it c"><div class="k"><em></em>Carbs</div><div class="g">'+Math.round(T.c)+'<small>g</small></div></div>'
       +'<div class="it f"><div class="k"><em></em>Fat</div><div class="g">'+Math.round(T.f)+'<small>g</small></div></div></div>'
   +'</div>'
   +'<div class="mctl"><span class="h">'+(wo?'Meals · around training':'Meals')+'</span><button id="toggleAll">'+(allOpen?'Collapse all':'Expand all')+'</button></div>'
   +mealsHtml+'</div>';

 document.querySelectorAll('[data-carb]').forEach(b=>b.onclick=()=>{st.dayTypes[active]=b.dataset.carb;save();render();});
 document.querySelectorAll('[data-sess]').forEach(b=>b.onclick=()=>{st.daySessions[active]=b.dataset.sess;save();render();});
 document.querySelectorAll('.mealhd').forEach(b=>b.onclick=()=>{const k=b.dataset.key;open.has(k)?open.delete(k):open.add(k);renderDay();});
 document.querySelectorAll('select.swap').forEach(sel=>sel.onchange=()=>{st.picks[sel.dataset.slot]=sel.value;save();renderDay();renderTabs();});
 document.getElementById('toggleAll').onclick=()=>{ if(allOpen)MEALS.forEach(me=>open.delete(active+'-'+me.n)); else MEALS.forEach(me=>open.add(active+'-'+me.n)); renderDay(); };
}

/* ---- render: shop ---- */
function weeklyTally(){
 const acc={};
 DAYS.forEach((_,i)=>{ const lvl=levelOf(st.dayTypes[i]);
   MEALS.forEach(me=>me.slots.forEach(s=>{ if(s.role==='veg')return; const f=slotFood(s); if(f.kcal===0)return;
     const r=slotCalc(s,lvl); const a=f.per==='unit'?parseFloat(r.amt):parseFloat(r.amt);
     if(!acc[f.id]) acc[f.id]={f,q:0}; acc[f.id].q+=a;
   })); });
 return acc;
}
const CATNAME={protein:'Protein',carb:'Carbs',fat:'Fats',cereal:'Cereal',milk:'Dairy',berry:'Fruit'};
function catOf(id){ for(const c of ['protein','carb','fat','milk','berry']){ if(LIB[c]&&LIB[c].some(f=>f.id===id)) return c; } return 'carb'; }
function renderShop(){
 const a=weeklyTally(); const c=counts();
 const groups={};
 Object.values(a).forEach(({f,q})=>{ const cat=catOf(f.id); (groups[cat]=groups[cat]||[]).push({f,q}); });
 const order=['protein','carb','fat','milk','berry'];
 let html='';
 order.forEach(cat=>{ if(!groups[cat])return; html+='<div class="cat">'+CATNAME[cat]+'</div>';
   groups[cat].forEach(({f,q})=>{
     let disp;
     if(f.id==='beefxp') disp=Math.round(q/30)+' scoops';
     else if(f.per==='unit') disp=Math.round(q)+' '+(f.unitName||'pcs');
     else if(f.unitName==='ml') disp=q>=1000?(q/1000).toFixed(1)+' L':r5(q)+' ml';
     else disp=q>=1000?(q/1000).toFixed(2)+' kg':r5(q)+' g';
     const ck=f.cooked?' <span class="sc">'+(f.dry?'dry':'raw')+'</span>':'';
     html+='<label class="shoprow'+(checked.has(f.id)?' done':'')+'"><input type="checkbox" data-fo="'+f.id+'"'+(checked.has(f.id)?' checked':'')+'>'
       +'<span class="sn">'+f.name+ck+'</span><span class="sq">'+disp+'</span></label>';
   });
 });
 document.getElementById('main').innerHTML='<div class="reveal"><div class="dayhd" style="margin-bottom:8px"><div class="dn">Shopping</div></div>'
   +'<section class="sheet"><div class="note">Your week as set — <b>'+c.hi+' high</b> / <b>'+c.lo+' low</b>, <b>'+c.wo+' training</b>, <b>'+PHASE_LBL[st.phase]+(st.structure==='uniform'?' · uniform':' · cycling')+'</b>, scaled to <b>'+st.weight+' lb</b>. Meat and rice listed as raw weight. Updates live as you swap foods and flip days.</div>'+html+'</section></div>';
 document.querySelectorAll('.shoprow input').forEach(ch=>ch.onchange=()=>{const fo=ch.dataset.fo;ch.checked?checked.add(fo):checked.delete(fo);ch.closest('.shoprow').classList.toggle('done',ch.checked);});
}

/* ---- render: guide ---- */
function renderGuide(){
 const wa=weekAvg(); const kg=st.weight/2.2046;
 document.getElementById('main').innerHTML='<div class="reveal"><div class="dayhd" style="margin-bottom:8px"><div class="dn">Guide</div></div>'
 +'<div class="gcard go"><h3><em>BUILD</em>Mince-core, swappable</h3><p>Every day is the same five-meal shape, with <b>mince as the core</b> of lunch and dinner. Tap any food to swap it for another in its category — the portion rescales to <b>hold that slot\u2019s macro</b>, so swapping mince for chicken keeps the protein identical. Fat slots are a single item now, no more doubling up.</p></div>'
 +'<div class="gcard info"><h3><em>PHASE</em>Cut · Maintain · Bulk</h3><p><b>Cut</b> runs a deficit, <b>Maintain</b> holds you level, <b>Lean bulk</b> adds a small surplus. Protein stays fixed (~2 g/kg) across all three; only carbs and fat move. At '+st.weight+' lb your week currently averages <b>'+fmt(wa.kcal)+' kcal</b>, <b>'+Math.round(wa.p)+'g protein</b>.</p></div>'
 +'<div class="gcard info"><h3><em>STRUCTURE</em>Cycling or uniform</h3><p><b>Carb cycling</b> splits the week into high and low days (carbs swing, protein holds). <b>Uniform</b> flattens every day to the same calories \u2014 flip to this when you move to a maintenance phase and just want consistency. The day tabs turn green in uniform mode to show there\u2019s no high/low split.</p></div>'
 +'<div class="gcard info"><h3><em>WEIGH</em>Raw or cooked</h3><p>Mince, chicken and rice show <b>both weights</b>. Weigh <b>raw</b> if you\u2019re cooking the meal fresh, or <b>cooked</b> if you\u2019ve batch-prepped. Either hits the same protein target. Figures shown are for the raw/dry weight; cooked lands within a few percent on the leaner cuts.</p></div>'
 +'<div class="gcard go"><h3><em>TRAIN</em>The shake</h3><p>On <b>workout</b> days the Shake / Snack meal becomes your <b>post-workout</b> feed \u2014 Beef-XP plus fast carbs (maltodextrin) when glycogen\u2019s emptiest. Swap it to eggs and toast on days you\u2019d rather eat than drink. Rest and workout days carry the same totals.</p></div>'
 +'<div class="gcard info"><h3><em>DIAL</em>Bodyweight + calories</h3><p><b>Bodyweight</b> scales every portion \u2014 drop it as you lean down. The <b>calorie slider</b> pushes the whole plan \u00b130% on top of your phase, for fine-tuning the rate without leaving the structure.</p></div>'
 +'<div class="gcard warn"><h3><em>FILL</em>Vegetables</h3><p>The veg slot is free \u2014 pile non-starchy veg (spinach, peppers, onion, broccoli, frozen mix) into both mince meals. Near-zero calories, and it\u2019s where most of your micronutrients and fibre come from. Frozen berries do the same job in the evening yogurt.</p></div>'
 +'</div>';
}

function render(){ renderTabs(); document.getElementById('phaseLbl').textContent=PHASE_LBL[st.phase]+' \u00b7 '+(st.structure==='uniform'?'Uniform':'Cycling'); if(view==='day')renderDay(); else if(view==='shop')renderShop(); else renderGuide(); }

/* ---- controls ---- */
function setPhaseUI(){ document.querySelectorAll('#phaseSeg button').forEach(b=>b.classList.toggle('on',b.dataset.phase===st.phase)); }
function setStructUI(){ document.querySelectorAll('#structSeg button').forEach(b=>{const on=b.dataset.struct===st.structure;b.classList.toggle('on',on);}); }
document.querySelectorAll('#phaseSeg button').forEach(b=>b.onclick=()=>{st.phase=b.dataset.phase;setPhaseUI();save();render();});
document.querySelectorAll('#structSeg button').forEach(b=>b.onclick=()=>{st.structure=b.dataset.struct;setStructUI();save();render();});
const wt=document.getElementById('wt'), wtVal=document.getElementById('wtVal');
wt.addEventListener('input',()=>{st.weight=+wt.value;wtVal.innerHTML=st.weight+'<span> lb</span>';save();render();});
const cal=document.getElementById('cal'), calVal=document.getElementById('calVal');
cal.addEventListener('input',()=>{st.calAdj=+cal.value;const p=st.calAdj*10;calVal.innerHTML=(p>0?'+':'')+p+'<span> %</span>';save();render();});

/* ---- init ---- */
wt.value=st.weight; wtVal.innerHTML=st.weight+'<span> lb</span>';
cal.value=st.calAdj; calVal.innerHTML=(st.calAdj*10>0?'+':'')+(st.calAdj*10)+'<span> %</span>';
setPhaseUI(); setStructUI();
render();
</script>
</body>
</html>
